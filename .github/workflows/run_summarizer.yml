name: Daily Freebie Summarizer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # Once a day at 22:00 UTC

jobs:
  run-summarizer-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Restore State Files
        uses: actions/cache@v4
        with:
          path: |
            freebies.db
            daily_deals.txt
          key: ${{ runner.os }}-state-files-main
          # Use restore-keys to grab a cache from a different branch if needed
          restore-keys: |
            ${{ runner.os }}-state-files-

      # --- NEW DEBUGGING STEP ---
      - name: DEBUG - Show contents of daily_deals.txt
        run: |
          if test -f "daily_deals.txt"; then
            echo "--- START BASE64 ENCODED daily_deals.txt ---"
            base64 daily_deals.txt
            echo "--- END BASE64 ENCODED daily_deals.txt ---"
          else
            echo "daily_deals.txt does not exist, nothing to display."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the Summarizer bot with Debugging
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot_summarizer.py