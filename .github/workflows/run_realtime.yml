name: Real-Time Freebie Notifier

on:
  workflow_dispatch:
  schedule:
    # Run every 30 minutes (UTC)
    - cron: '*/30 * * * *'

jobs:
  run-notifier-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the Real-Time Notifier bot
        env:
          GITHUB_ACTIONS: 'true'
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_realtime.py

      - name: Commit and push state file changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add freebies.db daily_deals.txt
          if ! git diff --staged --quiet; then
            git commit -m "Update state files (automated)"
            git push
          else
            echo "No changes to commit."
          fi
