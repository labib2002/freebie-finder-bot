name: Real-Time Freebie Notifier

on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *' # Every hour at 30 mins past

jobs:
  run-notifier-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # This step restores BOTH the permanent DB and the daily log
      - name: Restore State Files
        uses: actions/cache@v4
        with:
          path: |
            freebies.db
            daily_deals.txt
          key: ${{ runner.os }}-state-files-main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the Real-Time Notifier bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_realtime.py